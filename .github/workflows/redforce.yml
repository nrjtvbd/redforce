name: Update RedForce Playlist

on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests

      - name: Run playlist fetcher
        run: python fetch_playlist.py

      - name: Commit and push playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update RedForce playlist [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
