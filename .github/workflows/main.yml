name: Update REDFORCE Token

on:
  schedule:
    - cron: '*/20 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests p7zip-full

      - name: Unzip and Run Scraper
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASS }}
        run: |
          # 7z ব্যবহার করে পাসওয়ার্ড দিয়ে আনজিপ করা
          7z x redforce_main.zip -p"$ZIP_PASS" -o. -y
          # আনজিপ হওয়ার পর ফাইলটি রান করা
          python update_redforce.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add playlist.m3u8
          git commit -m "Auto Update Playlist" || exit 0
          git push origin main
